<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0b" />
    <title>Hora do Treino | Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(34, 197, 94, 0.14), transparent 34%),
          linear-gradient(180deg, #121212 0%, #080808 45%, #050505 100%);
        color: #f5f5f5;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      }

      .card {
        width: 100%;
        max-width: 420px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        padding: 28px 24px;
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(16px);
        text-align: center;
      }

      .icon {
        width: 88px;
        height: 88px;
        border-radius: 24px;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 1.7rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.6;
      }

      .hint {
        margin-top: 18px;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.58);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="icon" src="/apple-touch-icon.png" alt="Hora do Treino" />
      <h1>Sem conexão no momento.</h1>
      <p>Você pode abrir novamente quando a internet voltar para continuar usando o Hora do Treino com segurança.</p>
      <p class="hint">Páginas privadas e dados do seu treino não ficam salvos offline neste dispositivo.</p>
    </main>
  </body>
</html>
